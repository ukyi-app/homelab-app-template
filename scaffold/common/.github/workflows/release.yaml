# main 머지 = 빌드 + GHCR push + homelab bump-poll 즉시 디스패치(크론 수렴 지연 제거).
# 빌드·디스패치 로직 SSOT는 homelab reusable-app-build.yaml@main — deploy-trigger 잡을 흡수(PR-11a).
# 여기선 호출만 한다: HOMELAB_DISPATCH_APP 시크릿 쌍을 passthrough(미설정=크론 백스톱, clean skip).
name: release
on:
  push:
    branches: [main]
permissions:
  contents: read
  packages: write
jobs:
  release:
    uses: ukyi-app/homelab/.github/workflows/reusable-app-build.yaml@main
    with:
      app: ${{ github.event.repository.name }}
    secrets:
      HOMELAB_DISPATCH_APP_ID: ${{ secrets.HOMELAB_DISPATCH_APP_ID }}
      HOMELAB_DISPATCH_APP_PRIVATE_KEY: ${{ secrets.HOMELAB_DISPATCH_APP_PRIVATE_KEY }}
