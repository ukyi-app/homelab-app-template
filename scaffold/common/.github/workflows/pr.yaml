# PR = 게이트. 앱의 품질 관문(typecheck·test)은 CI 잡이 아니라 Dockerfile 안에 산다(ADR-0001) — 그래서 그 게이트를
# 돌리는 유일한 방법은 '이미지를 빌드하는 것'이다. 여기선 릴리스와 '같은' 빌드를 돌리되 레지스트리만 건드리지 않는다:
# homelab reusable-app-build의 push: false(BUILD ONLY — GHCR 로그인·push 없음, deploy-trigger 잡도 뜨지 않는다).
# 이게 없던 동안 앱 레포의 PR은 체크 0개로 승인 요청됐고(org 전역 Renovate의 의존성·베이스 이미지 범프가 특히),
# 게이트는 머지 후 — 즉 '이미 배포되는 중'에 — 처음 울렸다. release.yaml(push: main)과 트리거가 겹치지 않으므로
# 같은 커밋을 두 번 빌드하지 않는다: PR 브랜치 push는 pull_request만, 머지는 push:main만 깨운다.
#
# ⚠️ permissions는 contents: read 하나다 — packages: write를 여기에 주지 마라.
#    reusable 워크플로는 잡 permissions를 '일부러' 선언하지 않는다(permissions는 표현식을 못 받아 모드별 분기가
#    불가능하고, called 워크플로는 caller 상한을 넘길 수 없어 넘기면 잡이 아니라 run 자체가 죽는다). 즉 상한을
#    정하는 건 전적으로 이 caller이고, 여기서 packages 스코프를 빼는 것이 "build-only run은 밀고 싶어도 못 민다"를
#    토큰 레벨에서 보장하는 유일한 수단이다 — push: false는 의도 선언일 뿐 권한이 아니다.
#    시크릿도 하나도 넘기지 않는다(HOMELAB_DISPATCH_APP_* 포함) — 미검증 PR 코드가 이미지 빌드 안에서 실행되는
#    자리(Dockerfile의 typecheck·test)에 자격증명을 놓지 않는다. 배포 디스패치는 PR에서 '돌지 않는 것'이 계약이다.
name: pr
on:
  # 필터를 걸지 않는다(branches·paths 둘 다). 이 워크플로의 존재 이유가 '체크 0개인 PR을 없애는 것'인데 필터는
  # 바로 그 상태를 조용히 되살린다:
  #   paths — 허용목록은 Dockerfile이 COPY하는 것 전부를 베낀 사본이 된다. 어긋나는 순간(소스 경로 하나 추가)
  #           그 PR은 무검사로 지나가고, required check으로 걸어두면 필터에 걸러진 PR은 체크가 영영 오지 않아
  #           머지가 대신 막힌다 — 양쪽 다 실패 모드다. Renovate는 package.json·bun.lock·Dockerfile을,
  #           사람은 src/·web/을 건드린다. 게이트는 그 전부에 필요하다.
  #   branches — base를 main으로 좁히면 스택된 PR(중간 브랜치 대상)이 무검사가 된다. 기본 base가 main이라
  #           좁혀서 얻는 것도 없다.
  pull_request:
# 같은 PR에 새 커밋이 오면 진행 중이던 run을 취소한다. 그 run이 검증하던 커밋은 더 이상 PR head가 아니라
# 결과가 붙을 곳이 없고(체크는 head SHA에 달린다), Renovate는 리베이스를 자주 한다 — arm64 러너를 죽은 커밋에
# 태우지 않는다. 취소가 안전한 건 build-only이기 때문이다(밀지도 배포하지도 않으니 중간에 끊겨도 남는 부작용이
# 없다) — 같은 이유로 release.yaml엔 이걸 넣지 않는다. 거긴 취소가 GHCR push·배포를 통째로 건너뛴다.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build:
    uses: ukyi-app/homelab/.github/workflows/reusable-app-build.yaml@main
    with:
      app: ${{ github.event.repository.name }}
      push: false
