# main 머지 = 빌드 → (온보딩 PR | 배포 dispatch). 빌드 로직의 SSOT는 homelab의 reusable 워크플로.
name: release
on:
  push:
    branches: [main]
permissions:
  contents: read
  packages: write
jobs:
  release:
    # 템플릿 레포 자신은 빌드하지 않는다(복사된 앱 레포에서만 동작) — 템플릿이 자기 이미지를 만들면 안 됨.
    if: github.repository != 'ukyi-app/homelab-app-template'
    uses: ukyi-app/homelab/.github/workflows/reusable-app-build.yaml@main
    with:
      app: ${{ github.event.repository.name }}
    secrets:
      dispatch-pat: ${{ secrets.HOMELAB_DISPATCH_PAT }} # org-level secret (자동 상속)
